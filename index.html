<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#FDFCF9" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#14120F" media="(prefers-color-scheme: dark)" />
    <title>NoteStream</title>

  
  <!-- FAVICONS -->
  <link rel="icon" href="/assets/favicon.ico" sizes="any" />
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
  <link rel="icon" type="image/png" href="/assets/favicon-32x32.png" sizes="32x32" />
  <link rel="icon" type="image/png" href="/assets/favicon-16x16.png" sizes="16x16" />
  <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png" />


    <!-- THEME FLASH PREVENTION
         Must run BEFORE the first paint. Sets the theme class on <html>
         and the background color directly on documentElement so the very
         first frame matches the resolved theme. -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem("notestream-theme");
          var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;

          // Default to system preference when nothing is stored.
          var theme = saved || "system";
          var resolved =
            theme === "system"
              ? (prefersDark ? "dark" : "light")
              : theme;

          var root = document.documentElement;
          root.classList.remove("light", "dark");
          root.classList.add(resolved);
          root.setAttribute("data-theme", resolved);

          // Paint the correct background on the FIRST frame, before CSS loads.
          // Values mirror --bg-primary in src/index.css.
          root.style.backgroundColor = resolved === "dark" ? "#14120F" : "#FDFCF9";
          root.style.colorScheme = resolved;
        } catch (e) {
          // If localStorage is blocked (private mode, etc.), fall through to
          // CSS defaults — better than throwing during page load.
        }
      })();
    </script>

    <!-- FONT LOADING
         Loaded here in <head> (not via @import inside index.css) so the
         browser starts the font download in parallel with the main CSS
         bundle, instead of waiting for the bundle to download + parse
         before discovering the font URL. This is the main fix for the
         "letters flashing / layout shifting" on first load. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,400&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
    />

    <!-- Hide the body until BOTH the stylesheet has applied AND the web
         fonts have loaded, then reveal. Prevents flash of unstyled text
         and the layout shift that follows when fallback fonts swap to
         Fraunces/Inter. main.jsx adds .theme-ready once fonts are ready
         (with a safety timeout so we never hang). -->
    <style>
      html:not(.theme-ready) body { visibility: hidden; }
      html.theme-ready body { visibility: visible; }
    </style>
  </head>

  <body class="bg-theme-primary text-theme-primary">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
